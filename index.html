<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherNow + AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Raleway:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
       
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg-start: #0f0c29;
    --bg-mid: #302b63;
    --bg-end: #24243e;
    --card-bg: rgba(255, 255, 255, 0.08);
    --card-border: rgba(255, 255, 255, 0.15);
    --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    --accent: #f9a825;
    --accent2: #42a5f5;
    --ai-color: #a78bfa;
    --ai-color2: #f472b6;
    --text-main: #ffffff;
    --text-soft: rgba(255, 255, 255, 0.7);
    --text-muted: rgba(255, 255, 255, 0.45);
    --blur: blur(14px);
    --radius: 18px;
    --radius-sm: 10px;
    --transition: 0.3s ease;
}


body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
    background-attachment: fixed;
    font-family: 'Nunito', sans-serif;
    color: var(--text-main);
    display: flex;
    justify-content: center;
    padding: 30px 16px 60px;
}


.app-wrapper {
    width: 100%;
    max-width: 860px;
}


.app-header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease both;
}

.header-icon {
    font-size: 3rem;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 12px rgba(249, 168, 37, 0.5));
}

.app-title {
    font-family: 'Raleway', sans-serif;
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 0 4px 20px rgba(249, 168, 37, 0.4);
}

.ai-badge {
    font-size: 1.6rem;
    background: linear-gradient(90deg, var(--ai-color), var(--ai-color2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.app-subtitle {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.5px;
}


.search-section {
    background: var(--card-bg);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 28px 30px;
    margin-bottom: 24px;
    box-shadow: var(--card-shadow);
    animation: fadeUp 0.6s ease 0.1s both;
}

.search-box {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color var(--transition), box-shadow var(--transition);
}

.search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(249, 168, 37, 0.2);
}

.search-icon {
    padding: 0 14px;
    font-size: 1.1rem;
    color: var(--text-muted);
}

.city-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--text-main);
    padding: 14px 0;
}

.city-input::placeholder { color: var(--text-muted); }

.search-btn {
    background: var(--accent);
    color: #1a1a2e;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    border: none;
    padding: 14px 24px;
    cursor: pointer;
    transition: background var(--transition), transform var(--transition);
}

.search-btn:hover { background: #ffb300; transform: scale(1.03); }
.search-btn:active { transform: scale(0.98); }

.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--text-muted);
    font-size: 0.9rem;
}

.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--card-border);
}

.location-btn {
    width: 100%;
    background: rgba(66,165,245,0.15);
    border: 1px solid rgba(66,165,245,0.4);
    color: var(--text-main);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 13px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background var(--transition), transform var(--transition);
}

.location-btn:hover { background: rgba(66,165,245,0.3); transform: translateY(-2px); }


.error-msg {
    display: none;
    background: rgba(244,67,54,0.15);
    border: 1px solid rgba(244,67,54,0.4);
    color: #ff8a80;
    border-radius: var(--radius-sm);
    padding: 14px 20px;
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 20px;
}

.error-msg.show { display: block; animation: fadeUp 0.3s ease both; }


.loader {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 40px;
    color: var(--text-soft);
}

.loader.show { display: flex; }

.spinner {
    width: 44px;
    height: 44px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}


.weather-section {
    display: none;
    flex-direction: column;
    gap: 24px;
}

.weather-section.show { display: flex; animation: fadeUp 0.5s ease both; }


.current-weather-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 30px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition);
}

.current-weather-card:hover { transform: translateY(-4px); }

.cw-left { display: flex; flex-direction: column; gap: 10px; }

.city-name {
    font-family: 'Raleway', sans-serif;
    font-size: 2rem;
    font-weight: 900;
}

.cw-date { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }

.cw-stats { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

.stat { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 700; color: var(--text-soft); }

.cw-desc { font-size: 0.9rem; font-weight: 600; color: var(--accent); text-transform: capitalize; }

.cw-right { display: flex; flex-direction: column; align-items: center; }

.cw-emoji-icon {
    font-size: 5rem;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(255,200,50,0.4));
}

.cw-big-temp {
    font-family: 'Raleway', sans-serif;
    font-size: 3.2rem;
    font-weight: 900;
    line-height: 1;
    margin-top: 4px;
}


.forecast-section {
    background: var(--card-bg);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 26px 30px;
    box-shadow: var(--card-shadow);
}

.forecast-title { font-size: 1.1rem; font-weight: 800; color: var(--text-soft); margin-bottom: 20px; }

.forecast-cards { display: flex; gap: 14px; flex-wrap: wrap; }

.fc-card {
    flex: 1;
    min-width: 120px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 16px 12px;
    text-align: center;
    transition: transform var(--transition), background var(--transition);
    animation: popIn 0.4s ease both;
}

.fc-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.12); }

.fc-date { font-size: 0.82rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }

.fc-temp {
    font-family: 'Raleway', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    margin: 6px 0 4px;
}

.fc-detail { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; line-height: 1.6; }


.ai-section {
    background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(244,114,182,0.08));
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: var(--radius);
    padding: 28px 30px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.ai-section-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--text-main);
}

.ai-section-header span { font-size: 1.3rem; }


.ai-quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

.ai-quick-btn {
    background: rgba(167,139,250,0.15);
    border: 1px solid rgba(167,139,250,0.4);
    color: var(--text-main);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 9px 18px;
    border-radius: 30px;
    cursor: pointer;
    transition: all var(--transition);
}

.ai-quick-btn:hover {
    background: rgba(167,139,250,0.35);
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(167,139,250,0.3);
}

.ai-quick-btn:active { transform: scale(0.97); }

.ai-quick-btn.loading {
    opacity: 0.6;
    pointer-events: none;
}


.ai-response-box {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: var(--radius-sm);
    padding: 20px 22px;
    min-height: 100px;
    font-size: 0.97rem;
    line-height: 1.75;
    color: var(--text-soft);
}

.ai-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    color: var(--text-muted);
    padding: 10px 0;
}

.ai-placeholder-icon { font-size: 2.5rem; }

.ai-response-text {
    color: var(--text-soft);
    white-space: pre-wrap;
}

.ai-typing {
    display: inline-flex;
    gap: 5px;
    align-items: center;
    color: var(--ai-color);
    font-weight: 700;
    font-size: 0.9rem;
}

.ai-typing span {
    width: 7px;
    height: 7px;
    background: var(--ai-color);
    border-radius: 50%;
    animation: bounce 1s infinite;
}

.ai-typing span:nth-child(2) { animation-delay: 0.15s; }
.ai-typing span:nth-child(3) { animation-delay: 0.3s; }

.ai-chat-row {
    display: flex;
    gap: 10px;
}

.ai-chat-input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    color: var(--text-main);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
}

.ai-chat-input::placeholder { color: var(--text-muted); }

.ai-chat-input:focus {
    border-color: var(--ai-color);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
}

.ai-chat-send {
    background: linear-gradient(135deg, var(--ai-color), var(--ai-color2));
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    border: none;
    padding: 12px 22px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
    white-space: nowrap;
}

.ai-chat-send:hover { opacity: 0.88; transform: translateY(-2px); }
.ai-chat-send:active { transform: scale(0.97); }
.ai-chat-send:disabled { opacity: 0.5; pointer-events: none; }


@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-6px); }
}


@media (max-width: 680px) {
    .app-title { font-size: 2rem; }

    .current-weather-card {
        padding: 22px 20px;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
    }

    .cw-right {
        flex-direction: row;
        align-items: center;
        gap: 12px;
        width: 100%;
        justify-content: center;
    }

    .cw-big-temp { font-size: 2.5rem; }
    .cw-emoji-icon { font-size: 3.5rem; }

    .forecast-section, .ai-section { padding: 22px 16px; }

    .fc-card { min-width: calc(50% - 8px); }

    .search-section { padding: 22px 18px; }

    .ai-quick-btns { gap: 8px; }
    .ai-quick-btn { font-size: 0.82rem; padding: 8px 14px; }

    .ai-chat-row { flex-direction: column; }
    .ai-chat-send { width: 100%; }
}

@media (max-width: 400px) {
    body { padding: 20px 10px 40px; }
    .fc-card { min-width: 100%; }
}
    </style>
</head>
<body>

<div class="app-wrapper">

    
    <header class="app-header">
        <div class="header-icon">🌤️</div>
        <h1 class="app-title">WeatherNow <span class="ai-badge">+ AI</span></h1>
        <p class="app-subtitle">Real-time weather · Powered by Claude AI</p>
    </header>

    <!-- Search Section -->
    <div class="search-section">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input class="city-input" type="text" placeholder="Enter city name...">
            <button class="search-btn">Search</button>
        </div>
        <div class="divider"><span>or</span></div>
        <button class="location-btn"><span>📍</span> Use My Location</button>
    </div>

    
    <div class="error-msg" id="error-msg"></div>

    
    <div class="weather-section" id="weather-section">

        
        <div class="current-weather-card">
            <div class="cw-left">
                <h2 class="city-name" id="city-name">--</h2>
                <p class="cw-date" id="cw-date">--</p>
                <div class="cw-stats">
                    <div class="stat"><span class="stat-icon">🌡️</span><span id="cw-temp">--°C</span></div>
                    <div class="stat"><span class="stat-icon">💧</span><span id="cw-humidity">--%</span></div>
                    <div class="stat"><span class="stat-icon">💨</span><span id="cw-wind">-- km/h</span></div>
                </div>
                <p class="cw-desc" id="cw-desc">--</p>
            </div>
            <div class="cw-right">
                <div id="cw-emoji" class="cw-emoji-icon">🌡️</div>
                <span class="cw-big-temp" id="cw-big-temp">--°</span>
            </div>
        </div>

        
        <div class="forecast-section">
            <h3 class="forecast-title">📅 5-Day Forecast</h3>
            <div class="forecast-cards" id="forecast-cards"></div>
        </div>

        
        <div class="ai-section">

            <div class="ai-section-header">
                <span>✨</span>
                <h3>AI Weather Assistant</h3>
                <span>✨</span>
            </div>

            
            <div class="ai-quick-btns">
                <button class="ai-quick-btn" data-type="summary">📋 Weather Summary</button>
                <button class="ai-quick-btn" data-type="outfit">👕 Outfit Tips</button>
                <button class="ai-quick-btn" data-type="activities">🎯 Activity Ideas</button>
                <button class="ai-quick-btn" data-type="fact">🌍 Fun Fact</button>
            </div>

            
            <div class="ai-response-box" id="ai-response-box">
                <div class="ai-placeholder">
                    <div class="ai-placeholder-icon">🤖</div>
                    <p>Search for a city first, then click any button above<br>or type your own question below!</p>
                </div>
            </div>

            
            <div class="ai-chat-row">
                <input class="ai-chat-input" id="ai-chat-input" type="text" placeholder="Ask AI anything about the weather...">
                <button class="ai-chat-send" id="ai-chat-send">Ask ✨</button>
            </div>

        </div>
        

    </div>

    
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Fetching weather data...</p>
    </div>

</div>

<script>
const cityInput      = document.querySelector(".city-input");
const searchBtn      = document.querySelector(".search-btn");
const locationBtn    = document.querySelector(".location-btn");
const weatherSection = document.getElementById("weather-section");
const forecastCards  = document.getElementById("forecast-cards");
const loader         = document.getElementById("loader");
const errorMsg       = document.getElementById("error-msg");
const cityNameEl     = document.getElementById("city-name");
const cwDateEl       = document.getElementById("cw-date");
const cwTempEl       = document.getElementById("cw-temp");
const cwHumEl        = document.getElementById("cw-humidity");
const cwWindEl       = document.getElementById("cw-wind");
const cwDescEl       = document.getElementById("cw-desc");
const cwEmojiEl      = document.getElementById("cw-emoji");
const cwBigTempEl    = document.getElementById("cw-big-temp");
const aiResponseBox  = document.getElementById("ai-response-box");
const aiChatInput    = document.getElementById("ai-chat-input");
const aiChatSend     = document.getElementById("ai-chat-send");
const aiQuickBtns    = document.querySelectorAll(".ai-quick-btn");


let currentWeatherContext = null;


function getWeatherInfo(code) {
    const map = {
        0:  { desc: "Clear Sky",           emoji: "☀️" },
        1:  { desc: "Mainly Clear",        emoji: "🌤️" },
        2:  { desc: "Partly Cloudy",       emoji: "⛅" },
        3:  { desc: "Overcast",            emoji: "☁️" },
        45: { desc: "Foggy",               emoji: "🌫️" },
        48: { desc: "Icy Fog",             emoji: "🌫️" },
        51: { desc: "Light Drizzle",       emoji: "🌦️" },
        53: { desc: "Moderate Drizzle",    emoji: "🌦️" },
        55: { desc: "Dense Drizzle",       emoji: "🌧️" },
        61: { desc: "Slight Rain",         emoji: "🌧️" },
        63: { desc: "Moderate Rain",       emoji: "🌧️" },
        65: { desc: "Heavy Rain",          emoji: "🌧️" },
        71: { desc: "Slight Snow",         emoji: "🌨️" },
        73: { desc: "Moderate Snow",       emoji: "❄️"  },
        75: { desc: "Heavy Snow",          emoji: "❄️"  },
        77: { desc: "Snow Grains",         emoji: "🌨️" },
        80: { desc: "Slight Showers",      emoji: "🌦️" },
        81: { desc: "Moderate Showers",    emoji: "🌧️" },
        82: { desc: "Violent Showers",     emoji: "⛈️" },
        85: { desc: "Snow Showers",        emoji: "🌨️" },
        86: { desc: "Heavy Snow Showers",  emoji: "❄️"  },
        95: { desc: "Thunderstorm",        emoji: "⛈️" },
        96: { desc: "Thunderstorm + Hail", emoji: "⛈️" },
        99: { desc: "Thunderstorm + Hail", emoji: "⛈️" },
    };
    return map[code] || { desc: "Unknown", emoji: "🌡️" };
}

function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString("en-US", {
        weekday: "short", month: "short", day: "numeric"
    });
}

function showLoader() {
    loader.classList.add("show");
    weatherSection.classList.remove("show");
    errorMsg.classList.remove("show");
    errorMsg.style.display = "none";
}

function hideLoader() {
    loader.classList.remove("show");
}

function showError(msg) {
    errorMsg.textContent = "⚠️ " + msg;
    errorMsg.style.display = "block";
    errorMsg.classList.add("show");
    weatherSection.classList.remove("show");
    hideLoader();
}

function renderWeather(cityName, current, daily) {
    const info = getWeatherInfo(current.weathercode);

    
    currentWeatherContext = {
        city: cityName,
        temp: current.temperature_2m,
        humidity: current.relativehumidity_2m,
        wind: current.windspeed_10m,
        condition: info.desc,
        forecast: daily.time.slice(1, 6).map((t, i) => ({
            date: t,
            maxTemp: daily.temperature_2m_max[i + 1],
            minTemp: daily.temperature_2m_min[i + 1],
            condition: getWeatherInfo(daily.weathercode[i + 1]).desc,
            rain: daily.precipitation_probability_max[i + 1] ?? 0
        }))
    };

    
    cityNameEl.textContent   = cityName;
    cwDateEl.textContent     = formatDate(new Date().toISOString().split("T")[0]);
    cwTempEl.textContent     = current.temperature_2m + "°C";
    cwHumEl.textContent      = current.relativehumidity_2m + "%";
    cwWindEl.textContent     = current.windspeed_10m + " km/h";
    cwDescEl.textContent     = info.desc;
    cwEmojiEl.textContent    = info.emoji;
    cwBigTempEl.textContent  = current.temperature_2m + "°";

    
    forecastCards.innerHTML = "";
    for (let i = 1; i <= 5; i++) {
        const dayInfo = getWeatherInfo(daily.weathercode[i]);
        const card = document.createElement("div");
        card.className = "fc-card";
        card.style.animationDelay = ((i - 1) * 0.08) + "s";
        card.innerHTML = `
            <p class="fc-date">${formatDate(daily.time[i])}</p>
            <div style="font-size:2.2rem;margin:6px 0">${dayInfo.emoji}</div>
            <p class="fc-temp">${daily.temperature_2m_max[i]}°C</p>
            <p class="fc-detail">
                💧 ${daily.precipitation_probability_max[i] ?? "--"}%<br>
                💨 ${daily.windspeed_10m_max[i]} km/h
            </p>
        `;
        forecastCards.appendChild(card);
    }

    
    aiResponseBox.innerHTML = `
        <div class="ai-placeholder">
            <div class="ai-placeholder-icon">🤖</div>
            <p>Weather loaded! Click a button above or ask me anything.</p>
        </div>`;

    hideLoader();
    weatherSection.classList.add("show");
}

function getWeatherDetails(cityName, lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast`
        + `?latitude=${lat}&longitude=${lon}`
        + `&current=temperature_2m,relativehumidity_2m,weathercode,windspeed_10m`
        + `&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max,precipitation_probability_max`
        + `&timezone=auto`;

    fetch(url)
        .then(r => r.json())
        .then(data => {
            if (!data.current || !data.daily) {
                showError("Could not load weather data. Please try again.");
                return;
            }
            renderWeather(cityName, data.current, data.daily);
        })
        .catch(() => showError("Network error. Please check your connection."));
}

function getCityCoordinates() {
    const name = cityInput.value.trim();
    if (!name) { showError("Please enter a city name."); return; }
    showLoader();
    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`)
        .then(r => r.json())
        .then(data => {
            if (!data.results?.length) {
                showError(`No city found for "${name}". Please try another.`);
                return;
            }
            const { name: n, latitude, longitude, country } = data.results[0];
            getWeatherDetails(`${n}, ${country}`, latitude, longitude);
            cityInput.value = "";
        })
        .catch(() => showError("Failed to find city. Please try again."));
}

function getUserCoordinates() {
    if (!navigator.geolocation) { showError("Geolocation not supported."); return; }
    showLoader();
    navigator.geolocation.getCurrentPosition(
        pos => {
            const { latitude, longitude } = pos.coords;
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`)
                .then(r => r.json())
                .then(data => {
                    const city = data.address?.city || data.address?.town || data.address?.village || "Your Location";
                    const country = data.address?.country_code?.toUpperCase() || "";
                    getWeatherDetails(`${city}${country ? ", " + country : ""}`, latitude, longitude);
                })
                .catch(() => getWeatherDetails("Your Location", latitude, longitude));
        },
        err => {
            showError(err.code === err.PERMISSION_DENIED
                ? "Location access denied. Please search manually."
                : "Could not get your location. Try searching manually.");
        }
    );
}


searchBtn.addEventListener("click", getCityCoordinates);
locationBtn.addEventListener("click", getUserCoordinates);
cityInput.addEventListener("keyup", e => { if (e.key === "Enter") getCityCoordinates(); });




function showAiTyping() {
    aiResponseBox.innerHTML = `
        <div class="ai-typing">
            <span></span><span></span><span></span>
            &nbsp; AI is thinking...
        </div>`;
}

function showAiResponse(text) {
    aiResponseBox.innerHTML = `<div class="ai-response-text">${text}</div>`;
}

function buildWeatherContext() {
    if (!currentWeatherContext) return null;
    const w = currentWeatherContext;
    const forecastStr = w.forecast.map(f =>
        `${f.date}: ${f.condition}, High ${f.maxTemp}°C / Low ${f.minTemp}°C, Rain chance ${f.rain}%`
    ).join("\n");
    return `City: ${w.city}\nCurrent: ${w.temp}°C, ${w.condition}, Humidity ${w.humidity}%, Wind ${w.wind} km/h\n5-Day Forecast:\n${forecastStr}`;
}

async function askClaude(userPrompt) {
    showAiTyping();
    setAiBtnsLoading(true);

    const weatherCtx = buildWeatherContext();
    const systemPrompt = weatherCtx
        ? `You are a friendly, helpful weather assistant. Here is the current weather data:\n\n${weatherCtx}\n\nGive short, helpful, friendly responses (2-5 sentences). Use emojis naturally.`
        : `You are a friendly weather assistant. The user hasn't searched for a city yet. Politely remind them to search for a city first, then answer general weather questions briefly.`;

    try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1000,
                system: systemPrompt,
                messages: [{ role: "user", content: userPrompt }]
            })
        });

        const data = await response.json();
        const text = data.content?.[0]?.text || "Sorry, I couldn't get a response. Please try again.";
        showAiResponse(text);
    } catch (err) {
        showAiResponse("⚠️ Couldn't connect to AI. Please check your connection and try again.");
    } finally {
        setAiBtnsLoading(false);
    }
}

function setAiBtnsLoading(isLoading) {
    aiQuickBtns.forEach(btn => btn.classList.toggle("loading", isLoading));
    aiChatSend.disabled = isLoading;
}

const quickPrompts = {
    summary:    "Give me a friendly, clear summary of today's weather and what to expect this week.",
    outfit:     "Based on today's weather, what outfit should I wear? Give practical and fun suggestions.",
    activities: "What outdoor or indoor activities do you recommend based on today's weather and the forecast?",
    fact:       "Share one interesting, surprising, or fun scientific fact about this type of weather or the current conditions."
};

aiQuickBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        const type = btn.dataset.type;
        askClaude(quickPrompts[type]);
    });
});


aiChatSend.addEventListener("click", () => {
    const question = aiChatInput.value.trim();
    if (!question) return;
    aiChatInput.value = "";
    askClaude(question);
});


aiChatInput.addEventListener("keyup", e => {
    if (e.key === "Enter") aiChatSend.click();
});
</script>
